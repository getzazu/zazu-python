name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(python -c "import tomllib,pathlib; \
            p=pathlib.Path('pyproject.toml'); \
            cfg=tomllib.loads(p.read_text()); \
            print(cfg['project'].get('version') or open('src/zazu_sdk/_version.py').read().split('=')[1].strip().strip('\"'))")
          if [[ "$tag" != "$pkg" ]]; then
            echo "Tag v$tag does not match package version $pkg" >&2
            exit 1
          fi
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" dist/* \
            --title "$tag" \
            --notes "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md)."
